version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: transitops
      POSTGRES_PASSWORD: transitops
      POSTGRES_DB: transitops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transitops"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: sh -c "npx prisma migrate deploy && node prisma/seed.js"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://transitops:transitops@postgres:5432/transitops?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    command: node src/server.js
    env_file: .env
    environment:
      DATABASE_URL: postgresql://transitops:transitops@postgres:5432/transitops?schema=public
      REDIS_URL: redis://redis:6379
      RUN_WORKER_IN_PROCESS: "false"
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    restart: unless-stopped
    command: node src/queues/notificationWorker.js
    env_file: .env
    environment:
      DATABASE_URL: postgresql://transitops:transitops@postgres:5432/transitops?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  uploads:
  logs:
